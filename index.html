<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel FTV</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f7fafc; padding: 20px; color: #2d3748; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status { font-size: 0.85rem; color: #718096; margin-bottom: 15px; text-align: center; font-weight: 500; }
        .input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        input { width: 60px; padding: 8px; text-align: center; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="status" id="sync-status">Conectando à rede FTV...</div>
    
    <div id="app-container" class="card">
        <p>Aguardando dados da planilha...</p>
    </div>

    <script>
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzZcvNUJSQTPQa1QLpVXnZ3QxKtMpDuWXuiREPy8UCtV4Beck0uGfSVgxVjXGliQbRJ/exec";
        
        window.injectCloudScores = function(data) {
            const statusDiv = document.getElementById('sync-status');
            statusDiv.innerText = "Atualizado às " + new Date().toLocaleTimeString();
            statusDiv.style.color = "#48bb78";
            
            console.log("Dados recebidos da nuvem:", data);
            
            // Exemplo de como renderizar: limpa e reconstrói
            const container = document.getElementById('app-container');
            container.innerHTML = "<h3>Placares</h3>";
            for (let key in data) {
                let div = document.createElement('div');
                div.className = 'input-group';
                div.innerHTML = `<span>${key}</span> <div><input value="${data[key][0]||''}"> x <input value="${data[key][1]||''}"></div>`;
                container.appendChild(div);
            }
        };

        function pullData() {
            let old = document.getElementById('jsonp-script');
            if (old) old.remove();
            
            let s = document.createElement('script');
            s.id = 'jsonp-script';
            s.src = BACKEND_URL + "?callback=injectCloudScores&cb=" + new Date().getTime();
            document.body.appendChild(s);
        }

        // Tenta atualizar a cada 10 segundos
        setInterval(pullData, 10000);
        pullData();
    </script>
</body>
</html>
